name: Build MSPP4 and Create Installer

on:
  push:
    branches: [ main , develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_call:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GITHUB_ACTOR: github.actor
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
        include:
          - os: ubuntu-latest
            platform: linux-debian
            installer-type: deb
            icon-path: ./src/main/resources/ninja/mspp/images/icon/MS_icon_256.png
          - os: windows-latest
            platform: windows
            installer-type: msi
            icon-path: .\src\main\resources\ninja\mspp\images\icon\mspp4.ico
          - os: macos-latest
            platform: macos
            installer-type: dmg
            icon-path: ./src/main/resources/ninja/mspp/images/icon/mspp4.icns
          - os: macos-15-intel
            platform: macos-intel
            installer-type: dmg
            icon-path: ./src/main/resources/ninja/mspp/images/icon/mspp4.icns

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        java-package: jdk+fx
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}_m2_${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}_m2

    - name: Checkout mspp4-core repository
      uses: actions/checkout@v4
      with:
        repository: masspp/mspp4-core
        path: mspp4-core

    - name: Set execute permissions for Maven wrapper (Unix)
      if: runner.os != 'Windows'
      run: chmod +x ./mvnw

    - name: Build mspp4-core
      working-directory: ./mspp4-core
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./mvnw.cmd clean package install -DskipTests
        else
          ./mvnw clean package install -DskipTests
        fi
      shell: bash

    - name: Build mspp-desktop
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./mvnw.cmd clean license:third-party-report package -DskipTests
        else
          ./mvnw clean license:third-party-report package -DskipTests
        fi
      shell: bash

    - name: Set up application version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"
      shell: bash

    - name: Create runtime image with jlink
      run: |
        $JAVA_HOME/bin/jlink \
          --add-modules java.base,java.desktop,java.logging,java.xml,java.prefs,java.datatransfer,java.sql,java.scripting,java.management,java.naming,javafx.base,javafx.controls,javafx.fxml \
          --output runtime-image \
          --strip-debug \
          --compress=2 \
          --no-header-files \
          --no-man-pages
      shell: bash

    - name: Create installer with jpackage (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input ./target \
          --name "MS++4" \
          --main-jar mspp4-desktop-jar-with-dependencies.jar \
          --main-class ninja.mspp.MsppLauncher \
          --icon ${{ matrix.icon-path }} \
          --type ${{ matrix.installer-type }} \
          --dest installers \
          --runtime-image runtime-image \
          --app-version ${{ steps.version.outputs.VERSION }} \
          --vendor "MS++4 Team" \
          --description "Mass Spectrometry Plus-Plus Platform 4" \
          --copyright "Copyright © 2025 MS++4 Team" \
          --linux-shortcut \
          --linux-menu-group "Science"

    - name: Create installer with jpackage (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        & "$env:JAVA_HOME\bin\jpackage.exe" `
          --input .\target `
          --name "MS++4" `
          --main-jar (Get-ChildItem .\target\mspp4-desktop-jar-with-dependencies.jar | Select-Object -First 1).Name `
          --main-class ninja.mspp.MsppLauncher `
          --icon ${{ matrix.icon-path }} `
          --type ${{ matrix.installer-type }} `
          --dest installers `
          --runtime-image runtime-image `
          --app-version ${{ steps.version.outputs.VERSION }} `
          --vendor "MSPP4 Team" `
          --description "Mass Spectrometry Post-Processing Platform 4" `
          --copyright "Copyright © 2025 MS++4 Team" `
          --win-shortcut `
          --win-menu `
          --win-dir-chooser
      shell: powershell

    - name: Create installer with jpackage (macOS)
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input ./target \
          --name "MSPP4" \
          --main-jar $(ls ./target/mspp4-desktop-jar-with-dependencies.jar | head -1 | xargs basename) \
          --main-class ninja.mspp.MsppLauncher \
          --icon ${{ matrix.icon-path }} \
          --type ${{ matrix.installer-type }} \
          --dest installers \
          --runtime-image runtime-image \
          --app-version ${{ steps.version.outputs.VERSION }} \
          --vendor "MSPP4 Team" \
          --description "Mass Spectrometry Plus-Plus Platform 4" \
          --copyright "Copyright © 2025 MS++4 Team"

    - name: Rename created installer
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
      run: |
        cd installer
        fname=*.dmg
        mv -- "$fname" "${fname%.dmg}.${{ runner.arch }}.dmg"
      shell: bash

    - name: List created installers
      run: |
        ls -la installers/
      shell: bash

    - name: Upload installer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mspp4-installer-${{ matrix.platform }}
        path: installers/*
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.platform }}
        path: |
          mspp4-core/target/surefire-reports/
          mspp-desktop/target/surefire-reports/
        retention-days: 7

